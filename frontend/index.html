
<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TuVir - Tutor Virtual</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#13a4ec',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                        secondary: '#1e293b',
                        surface: '#111c22',
                        'surface-light': '#1b2a33'
                    },
                    fontFamily: {
                        sans: ['Quicksand', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'bounce-short': 'bounce-short 1.5s ease-in-out infinite',
                        'swing': 'swing 2s ease-in-out infinite',
                        'fade-up-out': 'fade-up-out 2s ease-out forwards',
                        'star-fall': 'star-fall 3s ease-in infinite',
                    },
                    keyframes: {
                        'bounce-short': {
                            '0%, 100%': { transform: 'translateY(-10px) scale(1.05)' },
                            '50%': { transform: 'translateY(0) scale(1)' },
                        },
                        'swing': {
                            '0%, 100%': { transform: 'rotate(0deg)' },
                            '10%, 30%, 50%, 70%, 90%': { transform: 'rotate(-10deg)' },
                            '20%, 40%, 60%, 80%': { transform: 'rotate(10deg)' },
                        },
                        'fade-up-out': {
                            '0%': { opacity: '0', transform: 'translate(-50%, 0)' },
                            '20%': { opacity: '1', transform: 'translate(-50%, -10px)' },
                            '80%': { opacity: '1', transform: 'translate(-50%, -10px)' },
                            '100%': { opacity: '0', transform: 'translate(-50%, -20px)' },
                        },
                        'star-fall': {
                            '0%': { transform: 'translateY(-100vh) rotate(0deg)', opacity: '1' },
                            '100%': { transform: 'translateY(100vh) rotate(360deg)', opacity: '0' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Quicksand', sans-serif; 
            scrollbar-gutter: stable;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .fill-1 { font-variation-settings: 'FILL' 1; }
        
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #233c48; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #13a4ec; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Star Shower effect */
        .star-shower-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }
        .falling-star {
            position: absolute;
            top: -50px;
            color: #facc15;
            animation: star-fall linear infinite;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
 
</head>
<body class="bg-[#0f172a] text-slate-200 antialiased overflow-hidden">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
